<!DOCTYPE html>
<!--
  post_html_template.html
  ========================
  HTML shell assembled by Agent 9 (Publisher Agent) before uploading
  to Blogger via the API. Blogger strips the outer <html>/<body> tags
  and inserts the inner content as the post body. The variables in
  double-curly-braces are replaced by the Publisher Agent at runtime.

  Variables injected by publisher.py:
    {{BREADCRUMB_HTML}}       – rendered breadcrumb trail
    {{GENRE_BADGE}}           – e.g. "Technology"
    {{TOPIC_BADGE}}           – e.g. "Artificial Intelligence"
    {{LAYER_BADGE}}           – e.g. "Research Articles"
    {{LAYER_CSS_CLASS}}       – slug for CSS colour, e.g. "research-articles"
    {{READ_TIME}}             – e.g. "8 min read"
    {{AUTHOR_NAME}}           – AI-generated byline for genre
    {{PUBLISH_DATE}}          – ISO 8601 formatted
    {{POST_TITLE}}            – H1 text
    {{META_DESCRIPTION}}      – 155-char SEO description
    {{FOCUS_KEYWORD}}         – primary SEO keyword
    {{CANONICAL_URL}}         – full canonical URL
    {{OG_IMAGE_URL}}          – featured image URL for OG tags
    {{FEATURED_IMAGE_URL}}    – hero image src
    {{FEATURED_IMAGE_ALT}}    – hero image alt text
    {{FEATURED_IMAGE_CREDIT}} – attribution line
    {{POST_BODY_HTML}}        – full rendered article body (H2/H3/p/ul)
    {{INLINE_CITATIONS_JSON}} – JSON array of citation objects (for schema)
    {{REFERENCE_LIST_HTML}}   – numbered reference section HTML
    {{FAQ_HTML}}              – FAQ accordion HTML (may be empty string)
    {{VIDEO_EMBED_HTML}}      – YouTube iframe (may be empty string)
    {{SCHEMA_JSON_LD}}        – Article JSON-LD blob
    {{DISQUS_SHORTNAME}}      – Disqus site shortname
    {{POST_URL}}              – full post URL for Disqus thread
    {{POST_ID}}               – Blogger post ID for Disqus
    {{LABELS_CSV}}            – comma-separated label string for display
-->

<!-- ═══════════════════════════════════════════════════════════
     SEO META — injected into <head> by Blogger template macros
     The Publisher Agent also writes these as post custom meta.
     ═══════════════════════════════════════════════════════════ -->
<meta name="description"        content="{{META_DESCRIPTION}}">
<meta name="keywords"           content="{{FOCUS_KEYWORD}}">
<link  rel="canonical"          href="{{CANONICAL_URL}}">

<!-- Open Graph -->
<meta property="og:type"        content="article">
<meta property="og:title"       content="{{POST_TITLE}}">
<meta property="og:description" content="{{META_DESCRIPTION}}">
<meta property="og:image"       content="{{OG_IMAGE_URL}}">
<meta property="og:url"         content="{{CANONICAL_URL}}">

<!-- Twitter Card -->
<meta name="twitter:card"        content="summary_large_image">
<meta name="twitter:title"       content="{{POST_TITLE}}">
<meta name="twitter:description" content="{{META_DESCRIPTION}}">
<meta name="twitter:image"       content="{{OG_IMAGE_URL}}">

<!-- Article JSON-LD Schema -->
<script type="application/ld+json">
{{SCHEMA_JSON_LD}}
</script>

<!-- ═══════════════════════════════════════════════════════════
     POST WRAPPER
     ═══════════════════════════════════════════════════════════ -->
<article class="ab-post" itemscope itemtype="https://schema.org/Article">

  <!-- ── Breadcrumb ──────────────────────────────────────────── -->
  <nav class="ab-breadcrumb" aria-label="Breadcrumb">
    {{BREADCRUMB_HTML}}
  </nav>

  <!-- ── Badge row ───────────────────────────────────────────── -->
  <div class="ab-badge-row">
    <span class="ab-badge ab-badge--genre">{{GENRE_BADGE}}</span>
    <span class="ab-badge ab-badge--topic">{{TOPIC_BADGE}}</span>
    <span class="ab-badge ab-badge--layer ab-badge--{{LAYER_CSS_CLASS}}">{{LAYER_BADGE}}</span>
    <span class="ab-badge ab-badge--read-time">&#128338; {{READ_TIME}}</span>
  </div>

  <!-- ── Post header ─────────────────────────────────────────── -->
  <header class="ab-post-header">
    <h1 class="ab-post-title" itemprop="headline">{{POST_TITLE}}</h1>
    <div class="ab-post-meta">
      <span class="ab-author" itemprop="author" itemscope itemtype="https://schema.org/Person">
        <svg class="ab-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <span itemprop="name">{{AUTHOR_NAME}}</span>
      </span>
      <time class="ab-date" itemprop="datePublished" datetime="{{PUBLISH_DATE}}">
        <svg class="ab-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        {{PUBLISH_DATE}}
      </time>
    </div>
  </header>

  <!-- ── Featured image ──────────────────────────────────────── -->
  <figure class="ab-featured-image" itemprop="image" itemscope itemtype="https://schema.org/ImageObject">
    <img src="{{FEATURED_IMAGE_URL}}"
         alt="{{FEATURED_IMAGE_ALT}}"
         itemprop="url"
         loading="lazy"
         class="ab-hero-img">
    <figcaption class="ab-img-credit">{{FEATURED_IMAGE_CREDIT}}</figcaption>
  </figure>

  <!-- ── Article body ────────────────────────────────────────── -->
  <div class="ab-post-body" itemprop="articleBody">
    {{POST_BODY_HTML}}
  </div>

  <!-- ── Conditional video embed ─────────────────────────────── -->
  {{VIDEO_EMBED_HTML}}

  <!-- ── FAQ accordion (optional) ────────────────────────────── -->
  {{FAQ_HTML}}

  <!-- ── Reference / Citations section ───────────────────────── -->
  <section class="ab-references" aria-labelledby="ab-ref-heading">
    <h2 id="ab-ref-heading" class="ab-references__heading">
      <svg class="ab-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      References &amp; Sources
    </h2>
    {{REFERENCE_LIST_HTML}}
  </section>

  <!-- ── Labels / Tags ────────────────────────────────────────── -->
  <div class="ab-labels" aria-label="Post tags">
    <svg class="ab-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
    {{LABELS_CSV}}
  </div>

  <!-- ── Share buttons ────────────────────────────────────────── -->
  <div class="ab-share-bar" data-url="{{CANONICAL_URL}}" data-title="{{POST_TITLE}}">
    <span class="ab-share-bar__label">Share:</span>
    <a class="ab-share-btn ab-share-btn--twitter"
       href="https://twitter.com/intent/tweet?url={{CANONICAL_URL}}&text={{POST_TITLE}}"
       target="_blank" rel="noopener" aria-label="Share on X / Twitter">𝕏</a>
    <a class="ab-share-btn ab-share-btn--facebook"
       href="https://www.facebook.com/sharer/sharer.php?u={{CANONICAL_URL}}"
       target="_blank" rel="noopener" aria-label="Share on Facebook">f</a>
    <a class="ab-share-btn ab-share-btn--linkedin"
       href="https://www.linkedin.com/shareArticle?mini=true&url={{CANONICAL_URL}}&title={{POST_TITLE}}"
       target="_blank" rel="noopener" aria-label="Share on LinkedIn">in</a>
    <a class="ab-share-btn ab-share-btn--whatsapp"
       href="https://wa.me/?text={{POST_TITLE}}%20{{CANONICAL_URL}}"
       target="_blank" rel="noopener" aria-label="Share on WhatsApp">&#128241;</a>
    <a class="ab-share-btn ab-share-btn--telegram"
       href="https://t.me/share/url?url={{CANONICAL_URL}}&text={{POST_TITLE}}"
       target="_blank" rel="noopener" aria-label="Share on Telegram">&#9992;</a>
    <a class="ab-share-btn ab-share-btn--reddit"
       href="https://reddit.com/submit?url={{CANONICAL_URL}}&title={{POST_TITLE}}"
       target="_blank" rel="noopener" aria-label="Share on Reddit">r/</a>
    <a class="ab-share-btn ab-share-btn--email"
       href="mailto:?subject={{POST_TITLE}}&body={{CANONICAL_URL}}"
       aria-label="Share via Email">&#9993;</a>
    <button class="ab-share-btn ab-share-btn--copy"
            onclick="navigator.clipboard.writeText('{{CANONICAL_URL}}').then(()=>this.textContent='Copied!').catch(()=>{})"
            aria-label="Copy link">&#128279; Copy</button>
  </div>

  <!-- ── Like / Reaction bar (Firebase-backed) ───────────────── -->
  <div class="ab-reaction-bar" id="ab-reactions" data-post-id="{{POST_ID}}">
    <button class="ab-reaction-btn" id="ab-like-btn"    data-type="like">
      &#10084;&#65039; Like <span class="ab-reaction-count" id="count-like">0</span>
    </button>
    <button class="ab-reaction-btn" id="ab-insightful-btn" data-type="insightful">
      &#128161; Insightful <span class="ab-reaction-count" id="count-insightful">0</span>
    </button>
    <button class="ab-reaction-btn" id="ab-helpful-btn" data-type="helpful">
      &#128077; Helpful <span class="ab-reaction-count" id="count-helpful">0</span>
    </button>
  </div>

  <!-- Firebase reaction logic is loaded by the Blogger template's
       global <script> block (see blogger_template.xml).
       The snippet below wires up this specific post's reactions. -->
  <script>
  (function() {
    var POST_ID = "{{POST_ID}}";
    // initPostReactions is defined in blogger_template.xml global JS
    if (typeof initPostReactions === 'function') {
      initPostReactions(POST_ID);
    }
  })();
  </script>

</article>

<!-- ═══════════════════════════════════════════════════════════
     DISQUS COMMENT SECTION
     ═══════════════════════════════════════════════════════════ -->
<section class="ab-comments" id="ab-comments">
  <h2 class="ab-comments__heading">Discussion</h2>
  <div id="disqus_thread"></div>
  <script>
    var disqus_config = function () {
      this.page.url      = "{{POST_URL}}";
      this.page.identifier = "{{POST_ID}}";
      this.page.title    = "{{POST_TITLE}}";
    };
    (function() {
      var d = document, s = d.createElement('script');
      s.src = 'https://{{DISQUS_SHORTNAME}}.disqus.com/embed.js';
      s.setAttribute('data-timestamp', +new Date());
      (d.head || d.body).appendChild(s);
    })();
  </script>
  <noscript>
    Please enable JavaScript to view the
    <a href="https://disqus.com/?ref_noscript" rel="nofollow noopener">
      comments powered by Disqus.
    </a>
  </noscript>
</section>
