<!DOCTYPE html>
<!--
  genre_landing_page.html
  ========================
  Auto-generated by Agent 10 (Self-Improvement) whenever a new genre
  is added to the taxonomy. Also used as a static HTML page published
  via Blogger Pages API for each genre.

  Variables replaced at generation time:
    {{GENRE_NAME}}          – e.g. "Technology"
    {{GENRE_SLUG}}          – e.g. "technology"
    {{GENRE_DESCRIPTION}}   – 2-sentence genre overview (AI-generated)
    {{GENRE_COLOR}}         – hex colour code for this genre
    {{GENRE_ICON_SVG}}      – inline SVG icon path data
    {{TOPICS_GRID_HTML}}    – rendered topic cards grid
    {{LATEST_POSTS_HTML}}   – rendered latest 6 post cards
    {{PILLAR_POST_HTML}}    – rendered single pillar post highlight card
    {{LAYER_TABS_HTML}}     – layer filter tabs HTML
    {{GENRE_SCHEMA_JSON}}   – BreadcrumbList + CollectionPage JSON-LD
    {{SITE_NAME}}           – blog display name
    {{CANONICAL_URL}}       – canonical URL for this genre page
    {{META_DESCRIPTION}}    – SEO meta description
    {{OG_IMAGE_URL}}        – genre OG image
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{GENRE_NAME}} — {{SITE_NAME}}</title>
  <meta name="description" content="{{META_DESCRIPTION}}">
  <link rel="canonical" href="{{CANONICAL_URL}}">

  <!-- Open Graph -->
  <meta property="og:type"        content="website">
  <meta property="og:title"       content="{{GENRE_NAME}} — {{SITE_NAME}}">
  <meta property="og:description" content="{{META_DESCRIPTION}}">
  <meta property="og:image"       content="{{OG_IMAGE_URL}}">
  <meta property="og:url"         content="{{CANONICAL_URL}}">

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="{{GENRE_NAME}} — {{SITE_NAME}}">
  <meta name="twitter:description" content="{{META_DESCRIPTION}}">
  <meta name="twitter:image"       content="{{OG_IMAGE_URL}}">

  <!-- JSON-LD -->
  <script type="application/ld+json">
  {{GENRE_SCHEMA_JSON}}
  </script>

  <style>
    /* ── Genre landing page scoped styles ─────────────────────── */
    :root {
      --genre-color: {{GENRE_COLOR}};
      --genre-color-light: {{GENRE_COLOR}}22;
    }

    /* Hero banner */
    .gl-hero {
      background: linear-gradient(135deg, var(--genre-color) 0%, var(--genre-color)cc 100%);
      color: #fff;
      padding: 3rem 1.5rem 2.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .gl-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .gl-hero__icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 1rem;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .gl-hero__icon svg {
      width: 32px;
      height: 32px;
      fill: none;
      stroke: #fff;
      stroke-width: 1.5;
    }
    .gl-hero h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      margin: 0 0 0.75rem;
      letter-spacing: -0.02em;
    }
    .gl-hero p {
      max-width: 620px;
      margin: 0 auto;
      opacity: 0.9;
      font-size: 1.1rem;
      line-height: 1.6;
    }

    /* Breadcrumb */
    .gl-breadcrumb {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.75);
      margin-bottom: 1.25rem;
    }
    .gl-breadcrumb a { color: rgba(255,255,255,0.85); text-decoration: none; }
    .gl-breadcrumb a:hover { text-decoration: underline; }
    .gl-breadcrumb span { margin: 0 0.4rem; }

    /* Main content wrapper */
    .gl-main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* Section headings */
    .gl-section-title {
      font-size: 1.35rem;
      font-weight: 700;
      color: #1a1a2e;
      margin: 2.5rem 0 1.25rem;
      padding-left: 0.75rem;
      border-left: 4px solid var(--genre-color);
    }

    /* ── Topics grid ──────────────────────────────────────────── */
    .gl-topics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1rem;
    }
    .gl-topic-card {
      background: var(--genre-color-light);
      border: 1px solid var(--genre-color)44;
      border-radius: 12px;
      padding: 1.25rem 1rem;
      text-decoration: none;
      color: #1a1a2e;
      font-weight: 600;
      font-size: 0.95rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
      text-align: center;
      transition: transform .2s, box-shadow .2s;
    }
    .gl-topic-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px var(--genre-color)33;
    }
    .gl-topic-card__icon {
      width: 40px;
      height: 40px;
      background: var(--genre-color);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .gl-topic-card__icon svg {
      width: 22px;
      height: 22px;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
    }
    .gl-topic-card__count {
      font-size: 0.75rem;
      font-weight: 400;
      color: #666;
    }

    /* ── Pillar post highlight ────────────────────────────────── */
    .gl-pillar-card {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-radius: 16px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 280px;
    }
    @media (max-width: 640px) { .gl-pillar-card { grid-template-columns: 1fr; } }
    .gl-pillar-card__img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      min-height: 200px;
    }
    .gl-pillar-card__body {
      padding: 2rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.75rem;
    }
    .gl-pillar-card__eyebrow {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--genre-color);
    }
    .gl-pillar-card__title {
      font-size: 1.4rem;
      font-weight: 800;
      color: #fff;
      line-height: 1.3;
      text-decoration: none;
    }
    .gl-pillar-card__title:hover { text-decoration: underline; }
    .gl-pillar-card__excerpt {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.7);
      line-height: 1.6;
    }
    .gl-pillar-card__cta {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.55rem 1.25rem;
      background: var(--genre-color);
      color: #fff;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
      align-self: flex-start;
    }
    .gl-pillar-card__cta:hover { opacity: 0.85; }

    /* ── Layer filter tabs ────────────────────────────────────── */
    .gl-layer-tabs {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .gl-layer-tab {
      padding: 0.4rem 1rem;
      border-radius: 100px;
      border: 1.5px solid #dde1e7;
      background: #fff;
      font-size: 0.82rem;
      font-weight: 600;
      color: #555;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s, color .15s, border-color .15s;
    }
    .gl-layer-tab:hover,
    .gl-layer-tab.active {
      background: var(--genre-color);
      color: #fff;
      border-color: var(--genre-color);
    }

    /* ── Latest posts grid ────────────────────────────────────── */
    .gl-posts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    .gl-post-card {
      background: #fff;
      border: 1px solid #e8ecf0;
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow .2s, transform .2s;
    }
    .gl-post-card:hover {
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
      transform: translateY(-2px);
    }
    .gl-post-card__img {
      width: 100%;
      height: 190px;
      object-fit: cover;
    }
    .gl-post-card__body {
      padding: 1.1rem 1.2rem 1.2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .gl-post-card__badges {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .gl-post-card__badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .gl-post-card__badge--topic  { background: var(--genre-color-light); color: var(--genre-color); }
    .gl-post-card__badge--layer  { background: #f0f4ff; color: #3b5bdb; }
    .gl-post-card__title {
      font-size: 1rem;
      font-weight: 700;
      color: #1a1a2e;
      line-height: 1.4;
      text-decoration: none;
      flex: 1;
    }
    .gl-post-card__title:hover { color: var(--genre-color); }
    .gl-post-card__excerpt {
      font-size: 0.85rem;
      color: #666;
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .gl-post-card__meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.78rem;
      color: #888;
      margin-top: auto;
      padding-top: 0.5rem;
      border-top: 1px solid #f0f0f0;
    }
    .gl-post-card__stat {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    /* ── Load more ────────────────────────────────────────────── */
    .gl-load-more {
      display: block;
      margin: 2.5rem auto 0;
      padding: 0.75rem 2.5rem;
      background: var(--genre-color);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
    }
    .gl-load-more:hover { opacity: 0.85; }
  </style>
</head>
<body>

<!-- ── Hero ──────────────────────────────────────────────────── -->
<section class="gl-hero">
  <nav class="gl-breadcrumb" aria-label="Breadcrumb">
    <a href="/">Home</a>
    <span aria-hidden="true">›</span>
    <span aria-current="page">{{GENRE_NAME}}</span>
  </nav>

  <div class="gl-hero__icon" aria-hidden="true">
    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
      {{GENRE_ICON_SVG}}
    </svg>
  </div>

  <h1>{{GENRE_NAME}}</h1>
  <p>{{GENRE_DESCRIPTION}}</p>
</section>

<!-- ── Main ──────────────────────────────────────────────────── -->
<main class="gl-main">

  <!-- Topics grid -->
  <h2 class="gl-section-title">Browse by Topic</h2>
  <div class="gl-topics-grid">
    {{TOPICS_GRID_HTML}}
  </div>

  <!-- Pillar post highlight -->
  <h2 class="gl-section-title">&#128204; Essential Reading</h2>
  {{PILLAR_POST_HTML}}

  <!-- Layer filter tabs + posts -->
  <h2 class="gl-section-title">Latest {{GENRE_NAME}} Posts</h2>
  <div class="gl-layer-tabs" role="tablist" aria-label="Filter by content type">
    <a class="gl-layer-tab active" href="/search/label/{{GENRE_SLUG}}" aria-selected="true">All</a>
    {{LAYER_TABS_HTML}}
  </div>

  <div class="gl-posts-grid" id="gl-posts-grid">
    {{LATEST_POSTS_HTML}}
  </div>

  <a class="gl-load-more"
     href="/search/label/{{GENRE_SLUG}}?max-results=12"
     id="gl-load-more">
    Load More Posts
  </a>

</main>

</body>
</html>
